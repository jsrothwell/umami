name: Create docker images

on:
  push:
    branches:
      - "master"
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Optional image version (e.g. 3.0.0, v3.0.0, or 3.0.0-beta.1)"
        required: false
        default: ""
      include_latest:
        description: "Include latest tag"
        required: false
        type: boolean
        default: true

jobs:
  build:
    name: Build, push, and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version tags
        id: compute
        run: |
          IMAGE="ghcr.io/jsrothwell/umami"
          INPUT="${{ github.event.inputs.version }}"
          REF_TYPE="${{ github.ref_type }}"
          REF_NAME="${{ github.ref_name }}"
          INCLUDE_LATEST="${{ github.event.inputs.include_latest }}"

          if [[ -n "$INPUT" ]]; then
            VERSION="${INPUT#v}"
          elif [[ "$REF_TYPE" == "tag" ]]; then
            VERSION="${REF_NAME#v}"
          else
            VERSION=""
          fi

          if [[ -n "$VERSION" ]]; then
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)

            if [[ "$VERSION" == *-* ]]; then
              TAGS="${IMAGE}:$VERSION"
            else
              TAGS="${IMAGE}:$VERSION,${IMAGE}:${MAJOR}.${MINOR},${IMAGE}:${MAJOR},${IMAGE}:postgresql-latest"
              if [[ "$REF_TYPE" == "tag" ]] || [[ "$INCLUDE_LATEST" == "true" ]]; then
                TAGS="$TAGS,${IMAGE}:latest"
              fi
            fi
          else
            TAGS="${IMAGE}:${REF_NAME}"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "Computed tags: $TAGS"

      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.compute.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max